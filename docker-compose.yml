services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: supersight
      POSTGRES_USER: supersight_user
      POSTGRES_PASSWORD: supersight123
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supersight_user -d supersight"]
      interval: 5s
      timeout: 5s
      retries: 5

